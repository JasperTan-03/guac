output_dir: checkpoints

# Batch / optimisation
# Generation is per-example (Qwen2-VL variable image resolutions prevent
# batched generate()), but log-prob forward passes are batched.
# Effective rollouts per optimizer step: batch_size × grad_accum = 8 × 1 = 8.
batch_size: 8
gradient_accumulation_steps: 1
learning_rate: 1e-5
weight_decay: 0.01
max_grad_norm: 1.0
num_train_steps: 5000
warmup_steps: 100
save_steps: 500
log_steps: 10

# Generation
max_new_tokens: 128
temperature: 1.0   # higher → more rollout diversity
top_p: 0.9
# Hard safety net: truncate if prompt + rollout exceeds this after tokenization.
max_seq_length: 2048

# Curriculum (unchanged from GRPO — Equations 1 & 2)
sampling_mode: gaussian   # baseline | gaussian
T_init: 0.1
eta: 0.05
alpha: 2.0
beta: 0.5
sigma: 0.15
d_min: 0.1   # true dataset floor — ScienceQA trivia lives here
d_max: 0.7   # true dataset ceiling — no problems above 0.7 exist

# REINFORCE-specific
# EMA baseline: b ← decay * b + (1 - decay) * R_avg
# The advantage A_i = R_hat_i - b provides gradient signal even when all
# rewards in a batch are identical (the GRPO killer case), because b is
# a historical average that hasn't converged to the current reward level.
ema_decay: 0.95

# KL penalty: R_hat_i = R_i - kl_coeff * KL_i
# Uses model.disable_adapter() for the reference model — zero extra VRAM.
kl_coeff: 0.1

# W&B logging (rank 0 only)
wandb_project: guac
# wandb_entity: null   # uncomment and set if using a team account
