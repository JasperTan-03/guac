output_dir: checkpoints

# Batch / optimisation
batch_size: 2
group_size: 4
gradient_accumulation_steps: 4
learning_rate: 1e-5
weight_decay: 0.01
max_grad_norm: 1.0
num_train_steps: 5000
warmup_steps: 100
save_steps: 500
log_steps: 10

# Generation
max_new_tokens: 128
temperature: 1.0   # higher → more rollout diversity → richer reward signal
top_p: 0.9
# Hard safety net: if prompt + rollout exceeds this after tokenization,
# truncate the generation so the forward pass stays bounded.  Catches
# edge cases where max_pixels doesn't fully prevent long sequences.
max_seq_length: 2048

# Curriculum
sampling_mode: gaussian   # baseline | gaussian
# T_init starts at d_min so the cold-start draws from the easiest
# problems in the dataset (ScienceQA trivia at d=0.1: "What is the
# capital of Washington?" etc.).  The base Qwen2-VL can actually answer
# these, giving a non-zero reward bootstrap.  The tanh update then
# ramps T up toward the productive-struggle zone (reward ≈ β = 0.5).
#
# IMPORTANT: the scored dataset has d ∈ {0.1, 0.2, 0.3, 0.4, …, 0.7}.
# Setting d_min=0.3 (the old default) cuts off 52% of the easy data
# and forces a cold model onto geometry problems it cannot solve at all
# — producing all-zero rewards on every step.  d_min=0.1 is the true
# dataset floor.
T_init: 0.1
eta: 0.05
alpha: 2.0
beta: 0.5
sigma: 0.15
d_min: 0.1   # true dataset floor — ScienceQA trivia lives here
d_max: 0.7   # true dataset ceiling — no problems above 0.7 exist

# GRPO / KL.  kl_coeff=0.0 disables the reference-model KL term.
# NOTE: with binary rewards and a cold policy, "flat groups" (every
# rollout gets the same reward → advantages = 0 → loss = 0) are the
# dominant failure mode.  The trainer now skips flat groups and logs
# train/flat_groups_frac to MLflow; a persistent value > 0.7 after ~50
# steps means the curriculum is sitting outside the productive zone.
kl_coeff: 0.0

# MLflow
mlflow_tracking_uri: mlruns
mlflow_experiment: grpo_curriculum
